name: formats

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    name: Formats

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup PHP
        uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240 # v2
        with:
          php-version: 8.3
          tools: composer:v2
          coverage: none

      - name: Cache Composer Dependencies
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: vendor
          key: ${{ runner.os }}-composer-8.3-prefer-stable-${{ hashFiles('composer.json') }}
          restore-keys: |
            ${{ runner.os }}-composer-8.3-
            ${{ runner.os }}-composer-

      - name: Install Dependencies
        run: composer update --prefer-stable --prefer-dist --no-interaction --no-progress

      - name: Cache PHPStan
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: /tmp/phpstan
          key: ${{ runner.os }}-phpstan-8.3-${{ hashFiles('composer.lock') }}
          restore-keys: ${{ runner.os }}-phpstan-8.3-

      - name: Create Cache Directories
        run: mkdir -p /tmp/phpstan /tmp/rector

      - name: Lint Checks
        run: composer test:lint

      - name: Type Checks
        run: composer test:types

      - name: Type Coverage Checks
        run: composer test:type-coverage

      - name: Refactor Checks
        run: composer test:refactor
